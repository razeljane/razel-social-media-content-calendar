function pbadge(pl){
  const c=PC[pl]||{bg:'#fce7f3',cl:'#9d174d'};
  return`<span class="pb" style="background:${c.bg};color:${c.cl}">${pl}</span>`;
}

function render(f){
  const g=document.getElementById('grid');
  const list=f==='all'?D:D.filter(p=>p.pl===f||p.an===f);
  g.innerHTML=list.map(p=>`
<div class="card" data-id="${p.id}">
  <div class="ch" onclick="tog(${p.id})">
    <div class="cn">${p.id}</div>
    <div class="cm">
      <div class="cr">${pbadge(p.pl)}<span class="at">· ${AL[p.an]}</span>&nbsp;<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${ADOT[p.an]};vertical-align:middle"></span></div>
      <div class="hk">${p.hk}</div>
    </div>
    <i class="ti ti-chevron-down cv" aria-hidden="true"></i>
  </div>
  <div class="body">
    <div class="sl">${p.pl==='YouTube'?'Title + description':'Caption'}</div>
    <div class="cap">${p.cap}</div>
    <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <button class="cpb" onclick="cp(event,${p.id})"><i class="ti ti-copy" aria-hidden="true"></i> Copy caption</button>
    <div class="sl">Visual direction</div>
    <div class="vis">${p.vis}</div>
    ${p.yt?`<div class="ytn"><div class="ytn-label">Production note</div>${p.yt}</div>`:''}
  </div>
</div>`).join('');
}

function tog(id){document.querySelector(`[data-id="${id}"]`).classList.toggle('open')}

function cp(e,id){
  e.stopPropagation();
  const p=D.find(x=>x.id===id);
  navigator.clipboard.writeText(p.cap+'\n\n'+p.tags.join(' ')).catch(()=>{});
  const b=e.currentTarget;
  b.classList.add('ok');
  b.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Copied!';
  setTimeout(()=>{b.classList.remove('ok');b.innerHTML='<i class="ti ti-copy" aria-hidden="true"></i> Copy caption';},2000);
}

document.getElementById('frow').addEventListener('click',e=>{
  if(!e.target.classList.contains('fb'))return;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  e.target.classList.add('on');
  render(e.target.dataset.f);
});

render('all');
</script>
